<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Breachproof: the autonomous AI security agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04140d"/>
      <stop offset="0.55" stop-color="#06281a"/>
      <stop offset="1" stop-color="#021009"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.6"/></filter>
  </defs>

  <rect width="1280" height="320" rx="20" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="240" fill="url(#glow)"/>
  <!-- subtle grid -->
  <g stroke="#0f3d2a" stroke-width="1" opacity="0.5">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280"/>
    <path d="M320 0 V320 M640 0 V320 M960 0 V320"/>
  </g>

  <!-- shield mark -->
  <g transform="translate(96,86)">
    <path d="M74 4 L138 28 V92 C138 138 110 168 74 184 C38 168 10 138 10 92 V28 Z"
          fill="#06120c" stroke="url(#accent)" stroke-width="5"/>
    <path d="M44 92 L66 116 L106 64" fill="none" stroke="url(#accent)" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="290" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="2" fill="#ecfdf5">BREACHPROOF</text>
  <text x="294" y="200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="500" fill="#6ee7b7">The autonomous AI security agent: point it at a codebase, walk away, come back to zero.</text>

  <!-- compatibility strip -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">
    <text x="294" y="262" fill="#9ca3af">RUN · FORGET · ZERO VULNERABILITIES</text>
  </g>
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#5eead4" opacity="0.9">
    <text x="294" y="294">agentskills.io · Hermes Agent · opencode · Claude Code · Cursor · Cline · OpenClaw</text>
  </g>

  <rect x="1" y="1" width="1278" height="318" rx="20" fill="none" stroke="#10b981" stroke-opacity="0.25" stroke-width="2"/>
</svg>
